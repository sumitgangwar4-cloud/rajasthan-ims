<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rajasthan Health IMS</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── localStorage helpers (replaces window.storage) ──────────────────────
    const storage = {
      get: (key) => {
        try { const v = localStorage.getItem(key); return v ? { value: v } : null; }
        catch(e) { return null; }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, value); } catch(e) { console.error('storage.set error', e); }
      }
    };

    const INITIAL_ITEMS = [
      { skuId:"IT001", name:"CPU",                  category:"IT", subCategory:"Hardware", type:"Asset", unit:"Nos", reorderLevel:50,  openingStock:500, currentStock:320, available:320 },
      { skuId:"IT002", name:"Barcode Scanner",       category:"IT", subCategory:"Hardware", type:"Asset", unit:"Nos", reorderLevel:30,  openingStock:200, currentStock:145, available:145 },
      { skuId:"IT003", name:"Keyboard Mouse Combo",  category:"IT", subCategory:"Hardware", type:"Asset", unit:"Nos", reorderLevel:100, openingStock:800, currentStock:550, available:550 },
      { skuId:"IT004", name:"UPS",                   category:"IT", subCategory:"Hardware", type:"Asset", unit:"Nos", reorderLevel:40,  openingStock:400, currentStock:280, available:280 },
      { skuId:"IT005", name:"Monitor",               category:"IT", subCategory:"Hardware", type:"Asset", unit:"Nos", reorderLevel:50,  openingStock:600, currentStock:410, available:410 },
    ];

    const norm = str => String(str||'').toLowerCase().replace(/[\s_\-().\/]/g,'');
    const findVal = (row, ...aliases) => {
      const keys = Object.keys(row);
      for (const alias of aliases) {
        const match = keys.find(k => norm(k) === norm(alias));
        if (match !== undefined && row[match] !== undefined && row[match] !== '') return row[match];
      }
      return '';
    };

    // ── Lucide icons via global lucide object ────────────────────────────────
    const Icon = ({ name, className }) => {
      const el = React.useRef(null);
      React.useEffect(() => {
        if (el.current && window.lucide) {
          el.current.innerHTML = '';
          const iconData = window.lucide[name.replace(/-([a-z])/g, g => g[1].toUpperCase())];
          if (iconData) {
            const [tag, attrs, children] = iconData;
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            const cls = (className||'w-5 h-5').split(' ');
            cls.forEach(c => svg.classList.add(c));
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('stroke-width', '2');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            (children||[]).forEach(([childTag,,childAttrs]) => {
              const child = document.createElementNS('http://www.w3.org/2000/svg', childTag);
              if (childAttrs) Object.entries(childAttrs).forEach(([k,v]) => child.setAttribute(k,v));
              svg.appendChild(child);
            });
            el.current.appendChild(svg);
          }
        }
      }, [name, className]);
      return React.createElement('span', { ref: el, style:{display:'inline-flex',alignItems:'center'} });
    };

    // Simple inline SVG icons to avoid Lucide UMD complexity
    const icons = {
      Search: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
      Package: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
      MapPin: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
      TrendingUp: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
      AlertCircle: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      CheckCircle: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Clock: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Plus: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Download: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Upload: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      X: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Save: ({cls}) => <svg className={cls||"w-5 h-5"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
    };

    const RajasthanIMSDashboard = () => {
      const [activeTab, setActiveTab] = useState('locations');
      const [locations, setLocations] = useState([]);
      const [inventory, setInventory] = useState([]);
      const [orders, setOrders] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterZone, setFilterZone] = useState('all');
      const [filterCategory, setFilterCategory] = useState('all');
      const [newOrder, setNewOrder] = useState({ locationId: '', items: [] });
      const [loading, setLoading] = useState(true);
      const [showAddLocation, setShowAddLocation] = useState(false);
      const [showAddItem, setShowAddItem] = useState(false);
      const [notification, setNotification] = useState(null);
      const [importPreview, setImportPreview] = useState(null);
      const [newLocation, setNewLocation] = useState({ zone:'', rjCode:'', name:'', address:'', city:'', category:'' });
      const [newItem, setNewItem] = useState({ skuId:'', name:'', category:'', subCategory:'', type:'', unit:'Nos', reorderLevel:0, openingStock:0, currentStock:0, available:0 });

      useEffect(() => { loadData(); }, []);

      const loadData = () => {
        try {
          const locRaw = storage.get('rj-locations');
          const invRaw = storage.get('rj-inventory');
          const ordRaw = storage.get('rj-orders');
          setLocations(locRaw?.value ? JSON.parse(locRaw.value) : []);
          setInventory(invRaw?.value ? JSON.parse(invRaw.value) : INITIAL_ITEMS);
          setOrders(ordRaw?.value ? JSON.parse(ordRaw.value) : []);
        } catch(e) {
          setLocations([]);
          setInventory(INITIAL_ITEMS);
          setOrders([]);
        }
        setLoading(false);
      };

      const saveData = (key, data) => {
        try { storage.set(key, JSON.stringify(data)); }
        catch(e) { console.error('Save error:', e); }
      };

      const showNotif = (message, type='success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // ── FILE IMPORT ──────────────────────────────────────────────────────
      const parseFile = (file, type) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            let rows = [];
            const name = file.name.toLowerCase();
            if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
              const wb = XLSX.read(e.target.result, { type: 'array' });
              const ws = wb.Sheets[wb.SheetNames[0]];
              rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
            } else {
              const text = e.target.result;
              const lines = text.split(/\r?\n/).filter(l => l.trim());
              const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
              rows = lines.slice(1).map(line => {
                const vals = line.split(',').map(v => v.replace(/"/g,'').trim());
                const obj = {};
                headers.forEach((h,i) => { obj[h] = vals[i] ?? ''; });
                return obj;
              }).filter(r => Object.values(r).some(v => v !== ''));
            }
            if (rows.length === 0) { showNotif('File appears empty or unreadable.','error'); return; }
            setImportPreview({ type, rows, headers: Object.keys(rows[0]), sampleRow: rows[0] });
          } catch(err) {
            console.error(err);
            showNotif('Could not parse file. Please upload a valid Excel (.xlsx) or CSV file.','error');
          }
        };
        if (file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file);
        else reader.readAsArrayBuffer(file);
      };

      const confirmImport = () => {
        if (!importPreview) return;
        const { type, rows } = importPreview;
        if (type === 'locations') {
          const parsed = rows.map((row,idx) => ({
            id: findVal(row,'id','LocationId','location id') || `LOC${Date.now()}_${idx}`,
            zone: findVal(row,'zone','Zone','ZONE'),
            rjCode: findVal(row,'rjCode','RJ Code','rjcode','rj_code','Code'),
            name: findVal(row,'name','Location Name','locationname','facility','FacilityName','HospitalName'),
            address: findVal(row,'address','Location Address','locationaddress','Address'),
            city: findVal(row,'city','City','District'),
            category: findVal(row,'category','Category','Type','FacilityType'),
          })).filter(l => l.name || l.rjCode);
          if (parsed.length === 0) { showNotif('No valid location rows found. Check column names.','error'); return; }
          setLocations(parsed);
          saveData('rj-locations', parsed);
          showNotif(`✅ ${parsed.length} locations imported successfully!`);
        } else if (type === 'inventory') {
          const parsed = rows.map((row,idx) => ({
            skuId: findVal(row,'skuId','SKU ID','skuid','sku','ItemCode') || `IT${Date.now()}_${idx}`,
            name: findVal(row,'name','Product Name','productname','ItemName','item name'),
            category: findVal(row,'category','Category'),
            subCategory: findVal(row,'subCategory','Sub Category','subcategory','SubCategory'),
            type: findVal(row,'type','Type'),
            unit: findVal(row,'unit','Unit') || 'Nos',
            reorderLevel: parseInt(findVal(row,'reorderLevel','Reorder Level','reorderlevel')) || 0,
            openingStock: parseInt(findVal(row,'openingStock','Opening Stock','openingstock')) || 0,
            currentStock: parseInt(findVal(row,'currentStock','Current Stock','currentstock')) || 0,
            available: parseInt(findVal(row,'available','Stock Available','stockavailable','Available')) || 0,
          })).filter(i => i.name || i.skuId);
          if (parsed.length === 0) { showNotif('No valid inventory rows found. Check column names.','error'); return; }
          setInventory(parsed);
          saveData('rj-inventory', parsed);
          showNotif(`✅ ${parsed.length} inventory items imported successfully!`);
        }
        setImportPreview(null);
      };

      // ── Export CSV ────────────────────────────────────────────────────────
      const exportCSV = (data, filename) => {
        if (!data.length) return;
        const headers = Object.keys(data[0]);
        const csv = [headers.join(','), ...data.map(r => headers.map(h => `"${r[h]??''}"`).join(','))].join('\n');
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(new Blob([csv], { type:'text/csv' })),
          download: filename
        });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        showNotif(`${filename} downloaded!`);
      };

      // ── Orders ────────────────────────────────────────────────────────────
      const handleAddOrder = () => {
        if (!newOrder.locationId || newOrder.items.length === 0) return;
        const order = {
          id: `ORD${Date.now()}`,
          locationId: newOrder.locationId,
          locationName: locations.find(l => l.id === newOrder.locationId)?.name || '',
          items: newOrder.items, status:'pending',
          createdAt: new Date().toISOString(),
          totalItems: newOrder.items.reduce((s,i) => s + i.quantity, 0)
        };
        const updOrders = [...orders, order];
        setOrders(updOrders); saveData('rj-orders', updOrders);
        const updInv = inventory.map(item => {
          const oi = newOrder.items.find(x => x.skuId === item.skuId);
          return oi ? { ...item, currentStock: item.currentStock - oi.quantity, available: item.available - oi.quantity } : item;
        });
        setInventory(updInv); saveData('rj-inventory', updInv);
        setNewOrder({ locationId:'', items:[] });
        showNotif('Order created!');
      };

      const handleAddItem = () => {
        if (!newItem.skuId || !newItem.name) { showNotif('SKU ID and Name are required.','error'); return; }
        const item = { ...newItem, reorderLevel:+newItem.reorderLevel||0, openingStock:+newItem.openingStock||0, currentStock:+newItem.currentStock||0, available:+newItem.available||0 };
        const upd = [...inventory, item]; setInventory(upd); saveData('rj-inventory', upd);
        setNewItem({ skuId:'', name:'', category:'', subCategory:'', type:'', unit:'Nos', reorderLevel:0, openingStock:0, currentStock:0, available:0 });
        setShowAddItem(false); showNotif('Item added!');
      };

      const handleAddLocation = () => {
        if (!newLocation.name || !newLocation.rjCode) { showNotif('Name and RJ Code are required.','error'); return; }
        const loc = { id:`LOC${Date.now()}`, ...newLocation };
        const upd = [...locations, loc]; setLocations(upd); saveData('rj-locations', upd);
        setNewLocation({ zone:'', rjCode:'', name:'', address:'', city:'', category:'' });
        setShowAddLocation(false); showNotif('Location added!');
      };

      // ── Derived state ─────────────────────────────────────────────────────
      const filteredLocations = locations.filter(l => {
        const s = searchTerm.toLowerCase();
        return (l.name?.toLowerCase().includes(s) || l.city?.toLowerCase().includes(s) || l.rjCode?.toLowerCase().includes(s))
          && (filterZone === 'all' || l.zone === filterZone)
          && (filterCategory === 'all' || l.category === filterCategory);
      });
      const zones = [...new Set(locations.map(l => l.zone).filter(Boolean))];
      const cats  = [...new Set(locations.map(l => l.category).filter(Boolean))];
      const lowStock = inventory.filter(i => i.currentStock <= i.reorderLevel);

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-50 to-blue-50">
          <div className="text-center">
            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-teal-600 mx-auto mb-4"></div>
            <p className="text-teal-700 font-medium">Loading IMS…</p>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gradient-to-br from-teal-50 via-blue-50 to-cyan-50 p-6">

          {/* Notification */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 px-6 py-4 rounded-lg shadow-2xl flex items-center gap-3 text-white ${notification.type==='success'?'bg-green-600':'bg-red-600'}`}>
              {notification.type==='success' ? <icons.CheckCircle cls="w-5 h-5"/> : <icons.AlertCircle cls="w-5 h-5"/>}
              <span className="font-semibold">{notification.message}</span>
            </div>
          )}

          {/* ── Import Preview Modal ── */}
          {importPreview && (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[85vh] flex flex-col">
                <div className="bg-gradient-to-r from-teal-600 to-blue-600 p-6 flex justify-between items-center rounded-t-2xl">
                  <div>
                    <h2 className="text-xl font-bold text-white">Preview Import — {importPreview.type==='locations'?'Locations':'Inventory'}</h2>
                    <p className="text-teal-100 text-sm mt-1">{importPreview.rows.length} rows detected · Importing will <strong>replace</strong> current data</p>
                  </div>
                  <button onClick={() => setImportPreview(null)} className="text-white hover:bg-white/20 rounded-full p-2"><icons.X cls="w-5 h-5"/></button>
                </div>
                <div className="p-6 flex-1 overflow-auto">
                  <p className="text-sm font-semibold text-gray-600 mb-2">Detected columns:</p>
                  <div className="flex flex-wrap gap-2 mb-4">
                    {importPreview.headers.map(h => <span key={h} className="px-3 py-1 bg-teal-100 text-teal-700 rounded-full text-xs font-medium">{h}</span>)}
                  </div>
                  <p className="text-sm font-semibold text-gray-600 mb-2">Sample row (first record):</p>
                  <div className="bg-gray-50 rounded-lg p-4 text-xs font-mono overflow-x-auto mb-4">
                    {Object.entries(importPreview.sampleRow).map(([k,v]) => (
                      <div key={k} className="flex gap-2"><span className="text-teal-600 font-bold">{k}:</span><span className="text-gray-700">{String(v)}</span></div>
                    ))}
                  </div>
                </div>
                <div className="p-6 border-t flex gap-3">
                  <button onClick={confirmImport} className="flex-1 py-3 bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold rounded-lg hover:shadow-lg">
                    ✅ Confirm Import ({importPreview.rows.length} rows)
                  </button>
                  <button onClick={() => setImportPreview(null)} className="px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300">Cancel</button>
                </div>
              </div>
            </div>
          )}

          {/* ── Add Location Modal ── */}
          {showAddLocation && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div className="sticky top-0 bg-gradient-to-r from-teal-600 to-blue-600 p-6 flex justify-between items-center rounded-t-2xl">
                  <h2 className="text-xl font-bold text-white">Add New Location</h2>
                  <button onClick={() => setShowAddLocation(false)} className="text-white hover:bg-white/20 rounded-full p-2"><icons.X cls="w-5 h-5"/></button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    {[['Zone','zone','e.g. Central'],['RJ Code *','rjCode','e.g. AJ001']].map(([label,key,ph]) => (
                      <div key={key}>
                        <label className="block text-sm font-semibold text-gray-700 mb-1">{label}</label>
                        <input value={newLocation[key]} onChange={e => setNewLocation({...newLocation,[key]:e.target.value})} placeholder={ph} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/>
                      </div>
                    ))}
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Location Name *</label>
                    <input value={newLocation.name} onChange={e => setNewLocation({...newLocation,name:e.target.value})} placeholder="e.g. Government Hospital" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Address</label>
                    <input value={newLocation.address} onChange={e => setNewLocation({...newLocation,address:e.target.value})} placeholder="Full address" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">City</label>
                      <input value={newLocation.city} onChange={e => setNewLocation({...newLocation,city:e.target.value})} placeholder="e.g. Ajmer" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                      <select value={newLocation.category} onChange={e => setNewLocation({...newLocation,category:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                        <option value="">Select…</option>
                        {['Hospital','CHC','PHC','UPHC','Sub Centre','AWC','SDH'].map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button onClick={handleAddLocation} className="flex-1 py-3 bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold rounded-lg flex items-center justify-center gap-2">
                      <icons.Save cls="w-4 h-4"/>Add Location
                    </button>
                    <button onClick={() => setShowAddLocation(false)} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── Add Item Modal ── */}
          {showAddItem && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div className="sticky top-0 bg-gradient-to-r from-teal-600 to-blue-600 p-6 flex justify-between items-center rounded-t-2xl">
                  <h2 className="text-xl font-bold text-white">Add Inventory Item</h2>
                  <button onClick={() => setShowAddItem(false)} className="text-white hover:bg-white/20 rounded-full p-2"><icons.X cls="w-5 h-5"/></button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">SKU ID *</label><input value={newItem.skuId} onChange={e => setNewItem({...newItem,skuId:e.target.value})} placeholder="e.g. IT009" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Product Name *</label><input value={newItem.name} onChange={e => setNewItem({...newItem,name:e.target.value})} placeholder="e.g. Wireless Mouse" className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Category</label><input value={newItem.category} onChange={e => setNewItem({...newItem,category:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Sub Category</label><input value={newItem.subCategory} onChange={e => setNewItem({...newItem,subCategory:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Reorder Level</label><input type="number" value={newItem.reorderLevel} onChange={e => setNewItem({...newItem,reorderLevel:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Current Stock</label><input type="number" value={newItem.currentStock} onChange={e => setNewItem({...newItem,currentStock:e.target.value,available:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/></div>
                    <div><label className="block text-sm font-semibold text-gray-700 mb-1">Unit</label>
                      <select value={newItem.unit} onChange={e => setNewItem({...newItem,unit:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                        <option>Nos</option><option>Pcs</option><option>Box</option><option>Pack</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button onClick={handleAddItem} className="flex-1 py-3 bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold rounded-lg flex items-center justify-center gap-2">
                      <icons.Save cls="w-4 h-4"/>Add Item
                    </button>
                    <button onClick={() => setShowAddItem(false)} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Header */}
          <div className="max-w-7xl mx-auto mb-8">
            <div className="bg-white rounded-2xl shadow-xl p-8 border-l-8 border-teal-600">
              <div className="flex items-center justify-between flex-wrap gap-4">
                <div>
                  <h1 className="text-4xl font-bold text-gray-900 mb-1">Rajasthan Health IMS</h1>
                  <p className="text-gray-500">Central Warehouse Management System</p>
                  <div className="flex gap-6 mt-4 flex-wrap">
                    <div className="flex items-center gap-2"><icons.MapPin cls="w-5 h-5 text-teal-600"/><span className="text-sm font-semibold text-gray-700">{locations.length} Locations</span></div>
                    <div className="flex items-center gap-2"><icons.Package cls="w-5 h-5 text-blue-600"/><span className="text-sm font-semibold text-gray-700">{inventory.length} Items</span></div>
                    <div className="flex items-center gap-2"><icons.AlertCircle cls="w-5 h-5 text-orange-500"/><span className="text-sm font-semibold text-gray-700">{lowStock.length} Low Stock</span></div>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-sm text-gray-500 mb-1">Total Units in Stock</div>
                  <div className="text-3xl font-bold text-teal-600">{inventory.reduce((s,i) => s+(i.currentStock||0),0).toLocaleString()}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div className="max-w-7xl mx-auto mb-6">
            <div className="bg-white rounded-xl shadow-lg p-2 flex gap-2">
              {[
                { id:'locations', label:'Locations Master', Icon: icons.MapPin },
                { id:'inventory', label:'Inventory Master', Icon: icons.Package },
                { id:'orders',    label:'Order Management', Icon: icons.TrendingUp }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                  className={`flex-1 flex items-center justify-center gap-2 px-6 py-4 rounded-lg font-semibold transition-all duration-300 ${activeTab===tab.id ? 'bg-gradient-to-r from-teal-600 to-blue-600 text-white shadow-lg scale-105' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                  <tab.Icon cls="w-5 h-5"/>{tab.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── LOCATIONS TAB ── */}
          {activeTab==='locations' && (
            <div className="max-w-7xl mx-auto space-y-6">
              <div className="flex flex-wrap gap-3">
                <button onClick={() => setShowAddLocation(true)} className="flex items-center gap-2 px-5 py-3 bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold rounded-lg hover:shadow-lg">
                  <icons.Plus cls="w-5 h-5"/>Add Location
                </button>
                <button onClick={() => exportCSV(locations,'locations-export.csv')} className="flex items-center gap-2 px-5 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700">
                  <icons.Download cls="w-5 h-5"/>Export CSV
                </button>
                <label className="flex items-center gap-2 px-5 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 cursor-pointer">
                  <icons.Upload cls="w-5 h-5"/>Import File (.xlsx / .csv)
                  <input type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e => { if(e.target.files[0]){ parseFile(e.target.files[0],'locations'); e.target.value=''; }}} />
                </label>
                {locations.length===0 && (
                  <div className="flex items-center gap-2 px-4 py-3 bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-lg text-sm">
                    <icons.AlertCircle cls="w-4 h-4"/>No locations loaded. Import your file above.
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="relative">
                    <span className="absolute left-3 top-3.5 text-gray-400"><icons.Search cls="w-5 h-5"/></span>
                    <input type="text" placeholder="Search name, city, code…" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"/>
                  </div>
                  <select value={filterZone} onChange={e => setFilterZone(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                    <option value="all">All Zones</option>
                    {zones.map(z => <option key={z} value={z}>{z}</option>)}
                  </select>
                  <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                    <option value="all">All Categories</option>
                    {cats.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>

              {filteredLocations.length===0 ? (
                <div className="text-center py-16 text-gray-400">
                  <div className="flex justify-center mb-4 opacity-30"><icons.MapPin cls="w-16 h-16"/></div>
                  <p className="text-lg">No locations found. Try adjusting filters or import your data.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {filteredLocations.map(loc => (
                    <div key={loc.id} className="bg-white rounded-xl shadow-lg p-6 hover:shadow-2xl transition-all border-t-4 border-teal-500">
                      <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-2"><icons.MapPin cls="w-4 h-4 text-teal-600"/><span className="font-bold text-gray-900">{loc.rjCode}</span></div>
                        {loc.category && <span className="px-2 py-1 bg-teal-100 text-teal-700 rounded-full text-xs font-semibold">{loc.category}</span>}
                      </div>
                      <h3 className="font-bold text-base text-gray-900 mb-1">{loc.name}</h3>
                      {loc.address && <p className="text-sm text-gray-500 mb-3">{loc.address}</p>}
                      <div className="flex items-center justify-between pt-3 border-t border-gray-100">
                        <span className="text-sm text-gray-500">{loc.city}</span>
                        {loc.zone && <span className="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold">{loc.zone}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ── INVENTORY TAB ── */}
          {activeTab==='inventory' && (
            <div className="max-w-7xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                <div className="p-6 bg-gradient-to-r from-teal-600 to-blue-600 flex justify-between items-center flex-wrap gap-4">
                  <div><h2 className="text-2xl font-bold text-white">Inventory Master</h2><p className="text-teal-100 mt-1">Track all inventory items</p></div>
                  <div className="flex gap-3 flex-wrap">
                    <button onClick={() => setShowAddItem(true)} className="flex items-center gap-2 px-4 py-2 bg-white text-teal-600 font-semibold rounded-lg hover:bg-teal-50">
                      <icons.Plus cls="w-4 h-4"/>Add
                    </button>
                    <button onClick={() => exportCSV(inventory,'inventory-export.csv')} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700">
                      <icons.Download cls="w-4 h-4"/>Export
                    </button>
                    <label className="flex items-center gap-2 px-4 py-2 bg-blue-700 text-white font-semibold rounded-lg hover:bg-blue-800 cursor-pointer">
                      <icons.Upload cls="w-4 h-4"/>Import
                      <input type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e => { if(e.target.files[0]){ parseFile(e.target.files[0],'inventory'); e.target.value=''; }}} />
                    </label>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead className="bg-gray-50">
                      <tr>{['SKU ID','Product Name','Category','Sub Category','Reorder Level','Current Stock','Status'].map(h => <th key={h} className="px-6 py-4 text-left text-xs font-bold text-gray-700 uppercase tracking-wider">{h}</th>)}</tr>
                    </thead>
                    <tbody className="divide-y divide-gray-200">
                      {inventory.map(item => (
                        <tr key={item.skuId} className="hover:bg-gray-50">
                          <td className="px-6 py-4 font-semibold text-teal-600">{item.skuId}</td>
                          <td className="px-6 py-4"><div className="font-medium text-gray-900">{item.name}</div><div className="text-xs text-gray-500">{item.unit}</div></td>
                          <td className="px-6 py-4 text-sm text-gray-700">{item.category}</td>
                          <td className="px-6 py-4 text-sm text-gray-700">{item.subCategory}</td>
                          <td className="px-6 py-4 text-right font-semibold text-gray-900">{item.reorderLevel}</td>
                          <td className="px-6 py-4 text-right"><span className={`font-bold text-lg ${item.currentStock<=item.reorderLevel?'text-red-600':'text-green-600'}`}>{item.currentStock}</span></td>
                          <td className="px-6 py-4 text-center">
                            {item.currentStock<=item.reorderLevel
                              ? <span className="inline-flex items-center gap-1 px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold"><icons.AlertCircle cls="w-3 h-3"/>Low Stock</span>
                              : <span className="inline-flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold"><icons.CheckCircle cls="w-3 h-3"/>In Stock</span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* ── ORDERS TAB ── */}
          {activeTab==='orders' && (
            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2"><icons.Plus cls="w-6 h-6 text-teal-600"/>Create New Order</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Select Location</label>
                    <select value={newOrder.locationId} onChange={e => setNewOrder({...newOrder,locationId:e.target.value})} className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                      <option value="">Choose location…</option>
                      {locations.map(l => <option key={l.id} value={l.id}>{l.name} ({l.rjCode})</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Add Items</label>
                    <div className="space-y-2 max-h-80 overflow-y-auto">
                      {inventory.map(item => (
                        <div key={item.skuId} className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                          <div className="flex-1"><div className="font-medium text-gray-900 text-sm">{item.name}</div><div className="text-xs text-gray-500">Available: {item.available}</div></div>
                          <input type="number" min="0" max={item.available} placeholder="Qty"
                            onChange={e => {
                              const q = parseInt(e.target.value)||0;
                              if (q>0) {
                                const ex = newOrder.items.find(x => x.skuId===item.skuId);
                                setNewOrder({...newOrder, items: ex
                                  ? newOrder.items.map(x => x.skuId===item.skuId ? {...x,quantity:q} : x)
                                  : [...newOrder.items, {skuId:item.skuId,name:item.name,quantity:q,unit:item.unit}]
                                });
                              }
                            }}
                            className="w-20 px-2 py-2 border border-gray-300 rounded text-center focus:ring-2 focus:ring-teal-500 outline-none"/>
                        </div>
                      ))}
                    </div>
                  </div>
                  {newOrder.items.length>0 && (
                    <div className="bg-teal-50 p-4 rounded-lg">
                      {newOrder.items.map(i => <div key={i.skuId} className="flex justify-between text-sm"><span>{i.name}</span><span className="font-bold">{i.quantity} {i.unit}</span></div>)}
                    </div>
                  )}
                  <button onClick={handleAddOrder} disabled={!newOrder.locationId||newOrder.items.length===0}
                    className="w-full py-3 bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
                    Create Order
                  </button>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2"><icons.Clock cls="w-6 h-6 text-blue-600"/>Recent Orders</h2>
                <div className="space-y-4 max-h-[600px] overflow-y-auto">
                  {orders.length===0
                    ? <div className="text-center py-12 text-gray-400"><div className="flex justify-center mb-4 opacity-30"><icons.Package cls="w-16 h-16"/></div><p>No orders yet.</p></div>
                    : orders.slice().reverse().map(order => (
                      <div key={order.id} className="p-4 border border-gray-200 rounded-lg hover:shadow-md transition-shadow">
                        <div className="flex justify-between items-start mb-2">
                          <div><div className="font-bold text-gray-900 text-sm">{order.id}</div><div className="text-xs text-gray-600">{order.locationName}</div></div>
                          <span className={`px-3 py-1 rounded-full text-xs font-bold ${order.status==='delivered'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}`}>{order.status}</span>
                        </div>
                        <div className="text-xs text-gray-500 mb-2">{order.totalItems} items · {new Date(order.createdAt).toLocaleString()}</div>
                        {order.status==='pending' && (
                          <button onClick={() => {
                            const upd = orders.map(o => o.id===order.id ? {...o,status:'delivered'} : o);
                            setOrders(upd); saveData('rj-orders', upd);
                          }} className="w-full py-2 bg-green-600 text-white text-sm font-semibold rounded hover:bg-green-700">
                            Mark as Delivered
                          </button>
                        )}
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RajasthanIMSDashboard));
  </script>
</body>
</html>
